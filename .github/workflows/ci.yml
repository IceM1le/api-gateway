name: API Gateway CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: /app
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # Остальные переменные для приложения можно оставить пустыми или задать заглушки
      APP_NAME: API Gateway
      APP_VERSION: 1.0.0
      DEBUG: true
      HOST: 0.0.0.0
      PORT: 8000
      CACHE_TTL: 300
      RATE_LIMIT: 100
      RATE_LIMIT_WINDOW: 60
      CIRCUIT_BREAKER_FAILURES: 5
      CIRCUIT_BREAKER_TIMEOUT: 30
      API_KEYS: test-key-1
      SERVICE_URLS: weather:https://api.weatherapi.com/v1,news:https://newsapi.org/v2,currency:https://api.exchangerate-api.com/v4/latest
      SERVICE_API_KEYS: weather:key:test_weather_key,news:apiKey:test_news_key,currency::

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest tests/ -v